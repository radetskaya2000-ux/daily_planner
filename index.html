const now=new Date();let currentMonth=now.getMonth()+1,currentYear=now.getFullYear(),selectedDay=now.getDate(),currentPage='daily',selectedTrainingDay=null;

const HK=(hi,d)=>`${currentYear}-${currentMonth}-${d}-h${hi}`;
const BK=(bi,w,sub)=>`${currentYear}-${currentMonth}-b${bi}-w${w}${sub||''}`;
const CK=(ci,d)=>`${currentYear}-${currentMonth}-c${ci}-${d}`;
const HD=(hi,d)=>habitsData[HK(hi,d)]===true;
const cntHD=hi=>{let c=0;for(let d=1;d<=new Date(currentYear,currentMonth,0).getDate();d++)if(HD(hi,d))c++;return c;};

function getWeekRanges(dim){const fd=new Date(currentYear,currentMonth-1,1).getDay(),so=fd===0?7:fd;const wks=[];let cur=1,wn=1;if(so>1){wks.push({w:wn,start:1,end:Math.min(8-so,dim)});cur=(8-so)+1;wn++;}while(cur<=dim){wks.push({w:wn,start:cur,end:Math.min(cur+6,dim)});cur+=7;wn++;}return wks;}
function getWeekForDay(day){const dim=new Date(currentYear,currentMonth,0).getDate();return getWeekRanges(dim).find(w=>day>=w.start&&day<=w.end);}
function getMonday(ds){const d=new Date(ds),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}

// Firebase: сохранить + локально
async function FBset(path,value){
  try{await set(ref(db,path),value);}catch(e){}
  localStorage.setItem('fb_'+path,JSON.stringify(value));
}

// Firebase: загрузить
async function FBget(path){
  try{const snap=await get(child(ref(db),path));if(snap.exists()){const v=snap.val();localStorage.setItem('fb_'+path,JSON.stringify(v));return v;}}catch(e){}
  const local=localStorage.getItem('fb_'+path);
  return local?JSON.parse(local):null;
}

// Загрузка ВСЕХ данных из Firebase
async function loadAllFromFB(){
  const data=await FBget('habitDefs');
  if(data){habitDefs=data;localStorage.setItem('habitDefs',JSON.stringify(data));}
  else{habitDefs=JSON.parse(localStorage.getItem('habitDefs')||'[{"name":"Утренняя зарядка","goal":31}]');}

  const bdata=await FBget('beautyDefs');
  if(bdata){beautyDefs=bdata;localStorage.setItem('beautyDefs',JSON.stringify(bdata));}
  else{beautyDefs=JSON.parse(localStorage.getItem('beautyDefs')||'[{"name":"Маска для лица","freq":2}]');}

  const cdata=await FBget('cleaningDefs');
  if(cdata){cleaningDefs=cdata;localStorage.setItem('cleaningDefs',JSON.stringify(cdata));}
  else{cleaningDefs=JSON.parse(localStorage.getItem('cleaningDefs')||'[{"name":"Застелить постель","type":"daily","goal":31}]');}

  const tdata=await FBget('trainingDefs');
  if(tdata){trainingDefs=tdata;localStorage.setItem('trainingDefs',JSON.stringify(tdata));}
  else{trainingDefs=JSON.parse(localStorage.getItem('trainingDefs')||'{}');}

  // Данные отметок
  const hdata=await FBget('habitsData');
  if(hdata){for(const k in hdata){habitsData[k]=hdata[k];localStorage.setItem(k,hdata[k]?'true':'false');}}

  const bedata=await FBget('beautyData');
  if(bedata){for(const k in bedata){beautyData[k]=bedata[k];localStorage.setItem(k,bedata[k]?'true':'false');}}

  const cldata=await FBget('cleaningData');
  if(cldata){for(const k in cldata){cleaningData[k]=cldata[k];localStorage.setItem(k,cldata[k]?'true':'false');}}

  const notes=await FBget('dailyNotes');
  if(notes){for(const k in notes){localStorage.setItem('notes_'+k,notes[k]);}}
}

function loadAllData(){
  const dim=new Date(currentYear,currentMonth,0).getDate();
  habitsData={};beautyData={};cleaningData={};
  for(let h=0;h<habitDefs.length;h++)for(let d=1;d<=dim;d++)habitsData[HK(h,d)]=localStorage.getItem(HK(h,d))==='true';
  for(let b=0;b<beautyDefs.length;b++)for(let w=1;w<=5;w++){beautyData[BK(b,w)]=localStorage.getItem(BK(b,w))==='true';beautyData[BK(b,w,'b')]=localStorage.getItem(BK(b,w,'b'))==='true';}
  for(let c=0;c<cleaningDefs.length;c++)for(let d=1;d<=dim;d++)cleaningData[CK(c,d)]=localStorage.getItem(CK(c,d))==='true';
}

async function saveAllToFB(){
  await FBset('habitDefs',habitDefs);
  await FBset('beautyDefs',beautyDefs);
  await FBset('cleaningDefs',cleaningDefs);
  await FBset('trainingDefs',trainingDefs);
  await FBset('habitsData',habitsData);
  await FBset('beautyData',beautyData);
  await FBset('cleaningData',cleaningData);
  const notes={};
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('notes_')){notes[k.replace('notes_','')]=localStorage.getItem(k);}}
  await FBset('dailyNotes',notes);
}

function getDailyQuote(){const today=new Date().toDateString(),s=localStorage.getItem('quoteDate');if(s===today)return localStorage.getItem('quoteText')||QUOTES[0];const q=QUOTES[Math.floor(Math.random()*QUOTES.length)];localStorage.setItem('quoteDate',today);localStorage.setItem('quoteText',q);return q;}

function buildCalendar(){const body=document.getElementById('calendarBody');body.innerHTML='';const t=`${MONTHS[currentMonth-1]} ${currentYear}`;document.getElementById('calMonthTitle').textContent=t;document.getElementById('monthTitle').textContent=t;const dim=new Date(currentYear,currentMonth,0).getDate(),fd=new Date(currentYear,currentMonth-1,1).getDay(),sd=fd===0?7:fd;if(selectedDay>dim)selectedDay=dim;let row=document.createElement('tr');for(let i=1;i<sd;i++)row.appendChild(document.createElement('td'));for(let d=1;d<=dim;d++){const cell=document.createElement('td');cell.textContent=d;cell.addEventListener('click',function(){selectDay(d,cell);});if(d===now.getDate()&&currentMonth===now.getMonth()+1&&currentYear===now.getFullYear())cell.classList.add('today');if(d===selectedDay)cell.classList.add('selected');row.appendChild(cell);if((d+sd-1)%7===0||d===dim){body.appendChild(row);row=document.createElement('tr');}}}
function selectDay(day,cell){selectedDay=day;document.querySelectorAll('.calendar-widget td').forEach(td=>td.classList.remove('selected'));if(cell)cell.classList.add('selected');loadDayData();}
function changeMonth(dir){currentMonth+=dir;if(currentMonth>12){currentMonth=1;currentYear++;}if(currentMonth<1){currentMonth=12;currentYear--;}localStorage.setItem('selectedMonth',currentMonth);localStorage.setItem('selectedYear',currentYear);loadAllData();buildCalendar();if(currentPage==='daily')loadDayData();else refreshCurrentPage();}

function loadDayData(){const dk=`${currentYear}-${currentMonth}-${selectedDay}`;document.getElementById('dailyTasks').innerHTML=JSON.parse(localStorage.getItem('daily_'+dk)||'[]').map((t,i)=>`<div class="task-item"><input type="checkbox" id="dt${i}" ${t.done?'checked':''} onchange="saveDailyTask(${i},this.checked)"><label for="dt${i}">${t.text}</label></div>`).join('');const ws=getMonday(dk);document.getElementById('weekTasks').innerHTML=JSON.parse(localStorage.getItem('week_'+ws)||'[]').map((t,i)=>`<div class="task-item"><input type="checkbox" id="wt${i}" ${t.done?'checked':''} onchange="saveWeekTask(${i},this.checked)"><label for="wt${i}">${t.text}</label></div>`).join('');document.getElementById('dailyNotes').value=localStorage.getItem('notes_'+dk)||'';document.getElementById('dailyNotes').oninput=function(){localStorage.setItem('notes_'+dk,this.value);};renderDailyHabits();renderDailyBeauty();renderDailyTraining();renderDailyCleaning();}
function renderDailyHabits(){const list=document.getElementById('dailyHabitsList');list.innerHTML='';let done=0;habitDefs.forEach((h,i)=>{const ch=HD(i,selectedDay);if(ch)done++;const row=document.createElement('div');row.className='habit-row';row.innerHTML=`<input type="checkbox" id="dh${i}" ${ch?'checked':''} onchange="toggleDailyHabit(${i},this.checked)"><label for="dh${i}">${h.name}</label>`;list.appendChild(row);});const pct=habitDefs.length?Math.round((done/habitDefs.length)*100):0;document.getElementById('dailyProgressFill').style.height=pct+'%';document.getElementById('dailyProgressLabel').textContent=pct+'%';}
function renderDailyBeauty(){const container=document.getElementById('dailyBeauty');container.innerHTML='';const wr=getWeekForDay(selectedDay);if(!wr)return;const wdk=`beauty_week_done_${currentYear}-${currentMonth}-w${wr.w}`,wd=JSON.parse(localStorage.getItem(wdk)||'{}');beautyDefs.forEach((b,bi)=>{const k1=BK(bi,wr.w),k2=BK(bi,wr.w,'b'),d1=beautyData[k1],d2=beautyData[k2],done=(b.freq===2)?(d1&&d2):d1;if((!done||wd[bi])&&(b.freq===1||!d1||!d2)){const sub=(b.freq===2&&!d1)?'':((b.freq===2&&d1&&!d2)?'b':'');const row=document.createElement('div');row.className='habit-row';row.innerHTML=`<input type="checkbox" ${wd[bi]||done?'checked':''} onchange="markBeautyDaily(${bi},${wr.w},this.checked,'${sub}')"><label>${b.name}${!d1&&b.freq===2?' (1/2)':''}${d1&&!d2&&b.freq===2?' (2/2)':''}</label>`;if(wd[bi]||done)row.querySelector('label').style.textDecoration='line-through';container.appendChild(row);}});}
function markBeautyDaily(bi,w,checked,sub){const key=BK(bi,w,sub);beautyData[key]=checked;localStorage.setItem(key,checked?'true':'false');const wk=`beauty_week_done_${currentYear}-${currentMonth}-w${w}`,wd=JSON.parse(localStorage.getItem(wk)||'{}');if(checked)wd[bi]=true;else delete wd[bi];localStorage.setItem(wk,JSON.stringify(wd));renderDailyBeauty();renderBeautyTracker();}
function renderDailyTraining(){document.getElementById('dailyTraining').innerHTML=getTrainingList(selectedDay).filter(n=>n&&n.trim()).map((n,i)=>`<div class="habit-row"><input type="checkbox" ${localStorage.getItem(`td_${currentYear}-${currentMonth}-${selectedDay}_${i}`)==='true'?'checked':''} onchange="saveTrainingCheck(${selectedDay},${i},this.checked)"><label>${n}</label>${localStorage.getItem(`tl_${currentYear}-${currentMonth}-${selectedDay}_${i}`)?`<a href="${localStorage.getItem(`tl_${currentYear}-${currentMonth}-${selectedDay}_${i}`)}" target="_blank" style="font-size:11px;color:#8aa8c8;margin-left:4px">▶</a>`:''}</div>`).join('');}
function renderDailyCleaning(){const container=document.getElementById('dailyCleaning');container.innerHTML='';const wr=getWeekForDay(selectedDay);if(!wr)return;const wdk=`clean_week_done_${currentYear}-${currentMonth}-w${wr.w}`,wd=JSON.parse(localStorage.getItem(wdk)||'{}');cleaningDefs.forEach((c,ci)=>{if(c.type==='daily'){const ch=cleaningData[CK(ci,selectedDay)];container.innerHTML+=`<div class="habit-row"><input type="checkbox" ${ch?'checked':''} onchange="toggleDailyCleaning(${ci},${selectedDay},this.checked)"><label>${c.name}</label></div>`;}else if(c.type==='weekly'){const ch=cleaningData[CK(ci,wr.start)];if(!ch||wd[ci]){const r=document.createElement('div');r.className='habit-row';r.innerHTML=`<input type="checkbox" ${wd[ci]||ch?'checked':''} onchange="markWeeklyCleaning(${ci},${wr.start},this.checked)"><label>${c.name}</label>`;if(wd[ci]||ch)r.querySelector('label').style.textDecoration='line-through';container.appendChild(r);}}else if(c.type==='monthly'){if(!cleaningData[CK(ci,1)]){container.innerHTML+=`<div class="habit-row"><input type="checkbox" onchange="markMonthlyCleaning(${ci},this.checked)"><label>${c.name}</label></div>`;}}});}
function toggleDailyCleaning(ci,day,checked){cleaningData[CK(ci,day)]=checked;localStorage.setItem(CK(ci,day),checked?'true':'false');}
function markWeeklyCleaning(ci,startDay,checked){cleaningData[CK(ci,startDay)]=checked;localStorage.setItem(CK(ci,startDay),checked?'true':'false');const wr=getWeekForDay(startDay),wk=`clean_week_done_${currentYear}-${currentMonth}-w${wr.w}`,wd=JSON.parse(localStorage.getItem(wk)||'{}');if(checked)wd[ci]=true;else delete wd[ci];localStorage.setItem(wk,JSON.stringify(wd));loadDayData();}
function markMonthlyCleaning(ci,checked){cleaningData[CK(ci,1)]=checked;localStorage.setItem(CK(ci,1),checked?'true':'false');loadDayData();}

document.getElementById('newDailyTask').addEventListener('keypress',function(e){if(e.key==='Enter'&&this.value.trim()){const dk=`${currentYear}-${currentMonth}-${selectedDay}`,t=JSON.parse(localStorage.getItem('daily_'+dk)||'[]');t.push({text:this.value.trim(),done:false});localStorage.setItem('daily_'+dk,JSON.stringify(t));this.value='';loadDayData();}});

function saveWeekTask(idx,checked){const ws=getMonday(`${currentYear}-${currentMonth}-${selectedDay}`),t=JSON.parse(localStorage.getItem('week_'+ws)||'[]');if(t[idx])t[idx].done=checked;localStorage.setItem('week_'+ws,JSON.stringify(t));loadDayData();}

function buildDotsGrid(dim,weeks,hi){const grid=document.createElement('div');grid.className='dots-grid';let pw=0;for(let d=1;d<=dim;d++){const w=weeks.find(wr=>d>=wr.start&&d<=wr.end);if(w&&w.w!==pw&&pw!==0){const sp=document.createElement('div');sp.className='dot-slot separator';grid.appendChild(sp);}if(w)pw=w.w;const slot=document.createElement('div');slot.className='dot-slot';const dot=document.createElement('div');dot.className='habit-dot';if(HD(hi,d)){dot.classList.add('done');dot.classList.add(WCLS[hi%5]);}dot.addEventListener('click',function(){const v=!HD(hi,d);habitsData[HK(hi,d)]=v;localStorage.setItem(HK(hi,d),v?'true':'false');renderHabitsTracker();if(selectedDay===d)renderDailyHabits();});slot.appendChild(dot);grid.appendChild(slot);}return grid;}
function renderHabitsTracker(){const dim=new Date(currentYear,currentMonth,0).getDate(),weeks=getWeekRanges(dim);document.getElementById('dayBarsRow').innerHTML=(()=>{let h='',pw=0;for(let d=1;d<=dim;d++){const w=weeks.find(wr=>d>=wr.start&&d<=wr.end);if(w&&w.w!==pw&&pw!==0)h+='<div class="day-bar-spacer"></div>';if(w)pw=w.w;const pct=habitDefs.length>0?(cntDD(d)/habitDefs.length)*100:0;h+=`<div class="day-bar-item"><div class="day-bar-fill" style="height:${Math.max(2,pct*1.5)}px"></div><div class="day-bar-num">${d}</div></div>`;}return h;})();const cards=document.getElementById('habitsCardsContainer');cards.innerHTML='';habitDefs.forEach((h,hi)=>{const dc=cntHD(hi),pct=Math.round((dc/h.goal)*100);const card=document.createElement('div');card.className=`habit-card ${WCLS[hi%5]}`;card.innerHTML=`<div class="habit-card-header"><span class="habit-card-name">${h.name}</span><span class="habit-card-goal">${dc}/${h.goal} <button class="habit-edit-btn" onclick="editHabit(${hi})">✎</button><button class="habit-delete-btn" onclick="deleteHabit(${hi})">✕</button></span></div><div class="habit-progress-bar"><div class="habit-progress-fill ${WCLS[hi%5]}" style="width:${pct}%"></div></div>`;card.appendChild(buildDotsGrid(dim,weeks,hi));cards.appendChild(card);});renderWeekCircles('weekCirclesContainer',dim,weeks,(wr)=>{let t=0,d=0;for(let dd=wr.start;dd<=wr.end;dd++)for(let h=0;h<habitDefs.length;h++){t++;if(HD(h,dd))d++;}return t>0?Math.round((d/t)*100):0;});renderInsightBlocks();}
function addHabit(){const name=prompt('Название:');if(!name||!name.trim())return;const goal=parseInt(prompt('Цель:'));if(isNaN(goal)||goal<1)return;habitDefs.push({name:name.trim(),goal});localStorage.setItem('habitDefs',JSON.stringify(habitDefs));saveAllToFB();renderHabitsTracker();}
function editHabit(hi){const name=prompt('Название:',habitDefs[hi].name);if(name===null)return;const goal=parseInt(prompt('Цель:',habitDefs[hi].goal));if(isNaN(goal)||goal<1)return;habitDefs[hi]={name:name.trim()||habitDefs[hi].name,goal};localStorage.setItem('habitDefs',JSON.stringify(habitDefs));saveAllToFB();renderHabitsTracker();}
function deleteHabit(hi){if(!confirm(`Удалить «${habitDefs[hi].name}»?`))return;habitDefs.splice(hi,1);localStorage.setItem('habitDefs',JSON.stringify(habitDefs));saveAllToFB();loadAllData();renderHabitsTracker();if(currentPage==='daily')loadDayData();}
function renderWeekCircles(id,dim,weeks,pctFn){document.getElementById(id).innerHTML=weeks.map(wr=>{const p=pctFn(wr);return`<div class="week-circle-wrap"><div class="week-circle" style="background:conic-gradient(${WCOLORS[(wr.w-1)%5]} ${p*3.6}deg,#e0d8cc 0deg)"><span>${p}%</span></div><div class="week-circle-label">Нед.${wr.w}</div></div>`;}).join('');}
function renderInsightBlocks(){const stats=habitDefs.map((h,i)=>({name:h.name,pct:Math.round((cntHD(i)/h.goal)*100)})).sort((a,b)=>a.pct-b.pct);document.getElementById('attentionList').innerHTML=stats.slice(0,3).map(h=>`<div class="insight-item"><span>${h.name}</span><span class="percent">${h.pct}%</span></div>`).join('');document.getElementById('successList').innerHTML=stats.slice(-3).reverse().map(h=>`<div class="insight-item"><span>${h.name}</span><span class="percent">${h.pct}%</span></div>`).join('');}

function renderBeautyTracker(){const dim=new Date(currentYear,currentMonth,0).getDate(),weeks=getWeekRanges(dim);document.getElementById('beautyDayBars').innerHTML=(()=>{let h='',pw=0;for(let d=1;d<=dim;d++){const w=weeks.find(wr=>d>=wr.start&&d<=wr.end);if(w&&w.w!==pw&&pw!==0)h+='<div class="day-bar-spacer"></div>';if(w)pw=w.w;h+=`<div class="day-bar-item"><div></div><div class="day-bar-num">${d}</div></div>`;}return h;})();document.getElementById('beautyCardsContainer').innerHTML=beautyDefs.map((b,bi)=>{let wh='';weeks.forEach(ww=>{const k1=BK(bi,ww.w),k2=BK(bi,ww.w,'b');wh+=`<div class="beauty-week-block" style="background:${WBEAUTY[(ww.w-1)%5]}22;border-color:${WBEAUTY[(ww.w-1)%5]}"><div class="beauty-week-label">Нед.${ww.w}</div><div class="beauty-week-dots"><div class="beauty-week-dot ${WCLS[bi%5]}${beautyData[k1]?' done':''}" onclick="beautyData['${k1}']=!beautyData['${k1}'];localStorage.setItem('${k1}',beautyData['${k1}']?'true':'false');renderBeautyTracker();"></div>${b.freq===2?`<div class="beauty-week-dot ${WCLS[bi%5]}${beautyData[k2]?' done':''}" onclick="beautyData['${k2}']=!beautyData['${k2}'];localStorage.setItem('${k2}',beautyData['${k2}']?'true':'false');renderBeautyTracker();"></div>`:''}</div></div>`;});return`<div class="beauty-card ${WCLS[bi%5]}"><div class="beauty-card-header"><span class="beauty-card-name">${b.name} (${b.freq}р/нед)</span><span><button class="habit-edit-btn" onclick="editBeauty(${bi})">✎</button><button class="habit-delete-btn" onclick="deleteBeauty(${bi})">✕</button></span></div><div class="beauty-weeks-row">${wh}</div></div>`;}).join('');renderWeekCircles('beautyWeekCircles',dim,weeks,(wr)=>{let ts=0,f=0;beautyDefs.forEach((b,bi)=>{ts+=b.freq;if(beautyData[BK(bi,wr.w)])f++;if(b.freq===2&&beautyData[BK(bi,wr.w,'b')])f++;});return ts>0?Math.round((f/ts)*100):0;});}
function addBeauty(){const name=prompt('Название:');if(!name||!name.trim())return;const freq=parseInt(prompt('Частота (1 или 2):'));if(freq!==1&&freq!==2)return;beautyDefs.push({name:name.trim(),freq});localStorage.setItem('beautyDefs',JSON.stringify(beautyDefs));saveAllToFB();renderBeautyTracker();}
function editBeauty(bi){const name=prompt('Название:',beautyDefs[bi].name);if(name===null)return;const freq=parseInt(prompt('Частота:',beautyDefs[bi].freq));if(freq!==1&&freq!==2)return;beautyDefs[bi]={name:name.trim()||beautyDefs[bi].name,freq};localStorage.setItem('beautyDefs',JSON.stringify(beautyDefs));saveAllToFB();renderBeautyTracker();}
function deleteBeauty(bi){if(!confirm(`Удалить «${beautyDefs[bi].name}»?`))return;beautyDefs.splice(bi,1);localStorage.setItem('beautyDefs',JSON.stringify(beautyDefs));saveAllToFB();renderBeautyTracker();}

function getTrainingList(d){const key=`${currentYear}-${currentMonth}-${d}`;if(trainingDefs[key])return trainingDefs[key];const def={1:['Flat Belly Pilates','Anti-Cellulite Thigh','Lower Belly Fat','Tired Body Stretch'],2:['Inner & Outer Thigh','Booty Burn','Core & Abs Band','Full Body Stretch'],3:['Morning Stretch','Tired Body Stretch','Daily Mobility Flow','Yoga for Better Posture'],4:['Morning Energy Workout','Flat Abs & Waist','Daily Stretch',''],5:['Pilates Arms','Lower Abs & Waist','Toned Arms Quickie','Evening Deep Stretch'],6:['Booty & Thigh Burn','Inner Thigh','Neck & Upper Back','Yoga for Back Pain'],7:['Standing Pilates Sculpt','Slim & Sculpt Pilates','Standing Abs','Hip & Lower Back Relief'],8:['Flat Belly Pilates','Anti-Cellulite Thigh','Lower Belly Fat','Tired Body Stretch'],9:['Inner & Outer Thigh','Booty Burn','Core & Abs Band','Full Body Stretch'],10:['Daily Mobility Flow','Morning Stretch','Tired Body Stretch','Yoga for Better Posture'],11:['Morning Pilates Weight Loss','Flat Abs & Waist','Daily Stretch',''],12:['Resistance Band Booty','Inner Thigh','Anti-Cellulite Thigh','Evening Deep Stretch'],13:['Pilates Arms','Standing Abs','Posture Care Routine','Yoga for Back Pain'],14:['Lower Abs & Waist','Booty Burn','Neck & Upper Back','Hip & Lower Back Relief'],15:['Standing Full Body','Standing Pilates Sculpt','Lower Belly Fat','Tired Body Stretch'],16:['Inner & Outer Thigh','Toned Arms Quickie','Core & Abs Band','Full Body Stretch'],17:['Daily Mobility Flow','Tired Body Stretch','Neck & Upper Back','Yoga for Better Posture'],18:['Full Body Toning Band','Slim & Sculpt Pilates','Daily Stretch','Evening Deep Stretch'],19:['Glutes & Legs Dumbbells','Inner Thigh','Booty Burn','Yoga for Back Pain'],20:['Pilates Arms','Lower Belly Fat','Posture Care Routine','Hip & Lower Back Relief'],21:['Morning Standing Band','Flat Abs & Waist','Neck & Upper Back','Tired Body Stretch'],22:['Slim & Sculpt Pilates','Anti-Cellulite Thigh','Standing Abs','Daily Stretch'],23:['Inner & Outer Thigh','Toned Arms Quickie','Core & Abs Band','Full Body Stretch'],24:['Daily Mobility Flow','Tired Body Stretch','Neck & Upper Back','Yoga for Better Posture'],25:['Morning Energy Workout','Flat Abs & Waist','Lower Belly Fat','Evening Deep Stretch'],26:['Lower-Body Pilates','Inner Thigh','Anti-Cellulite Thigh','Yoga for Back Pain'],27:['Flat Belly Pilates','Pilates Arms','Posture Care Routine','Hip & Lower Back Relief'],28:['Standing Pilates Sculpt','Slim & Sculpt Pilates','Neck & Upper Back','Tired Body Stretch'],29:['Standing Full Body','Morning Standing Band','Booty Burn','Daily Stretch'],30:['Inner & Outer Thigh','Toned Arms Quickie','Core & Abs Band','Full Body Stretch'],31:['Inner & Outer Thigh','Toned Arms Quickie','Core & Abs Band','Full Body Stretch']};return def[d]||[];}
function saveTrainingCheck(day,idx,checked){localStorage.setItem(`td_${currentYear}-${currentMonth}-${day}_${idx}`,checked?'true':'false');renderTrainingTracker();if(day===selectedDay)renderDailyTraining();}
function deleteTraining(day,idx){const list=getTrainingList(day);if(!confirm(`Удалить «${list[idx]}»?`))return;list.splice(idx,1);trainingDefs[`${currentYear}-${currentMonth}-${day}`]=list;localStorage.setItem('trainingDefs',JSON.stringify(trainingDefs));saveAllToFB();renderTrainingTracker();if(day===selectedDay)renderDailyTraining();}
function editTrainingLink(day,idx){const key=`tl_${currentYear}-${currentMonth}-${day}_${idx}`;const link=prompt('Ссылка:',localStorage.getItem(key)||'');if(link===null)return;if(link.trim())localStorage.setItem(key,link.trim());else localStorage.removeItem(key);renderTrainingTracker();}
function addTrainingDay(day){const name=prompt('Название:');if(!name||!name.trim())return;const link=prompt('Ссылка на YouTube:');const key=`${currentYear}-${currentMonth}-${day}`;if(!trainingDefs[key])trainingDefs[key]=getTrainingList(day).filter(x=>x);trainingDefs[key].push(name.trim());localStorage.setItem('trainingDefs',JSON.stringify(trainingDefs));saveAllToFB();if(link&&link.trim())localStorage.setItem(`tl_${key}_${trainingDefs[key].length-1}`,link.trim());renderTrainingTracker();if(day===selectedDay)renderDailyTraining();}
function renderTrainingTracker(){const dim=new Date(currentYear,currentMonth,0).getDate();let html='';const fd=new Date(currentYear,currentMonth-1,1).getDay(),so=fd===0?7:fd;let day=1,fr=true;while(day<=dim){let rh='<div class="training-week-row">';for(let col=1;col<=7;col++){if(fr&&col<so){rh+='<div class="training-day-cell empty"></div>';continue;}if(day>dim){rh+='<div class="training-day-cell empty"></div>';day++;continue;}const dow=new Date(currentYear,currentMonth-1,day).getDay();const list=getTrainingList(day);let total=0,done=0;list.forEach((n,i)=>{if(!n||!n.trim())return;total++;if(localStorage.getItem(`td_${currentYear}-${currentMonth}-${day}_${i}`)==='true')done++;});rh+=`<div class="training-day-cell${dow===0||dow===6?' weekend':''}${selectedTrainingDay===day?' selected':''}" onclick="selectedTrainingDay=selectedTrainingDay===${day}?null:${day};renderTrainingTracker();"><div class="training-day-num">${day}</div><div class="training-day-bar"><div class="training-day-bar-fill" style="width:${total>0?Math.round((done/total)*100):0}%"></div></div><div class="training-day-indicators">${list.filter(n=>n&&n.trim()).map((n,i)=>`<div class="training-dot${localStorage.getItem('td_'+currentYear+'-'+currentMonth+'-'+day+'_'+i)==='true'?' done':''}"></div>`).join('')}</div></div>`;day++;}rh+='</div>';html+=rh;fr=false;}document.getElementById('trainingGrid').innerHTML=html;const detail=document.getElementById('trainingDetail');detail.innerHTML='';if(selectedTrainingDay){const list=getTrainingList(selectedTrainingDay);detail.className='training-detail';let dh=`<div class="training-detail-date">${selectedTrainingDay} мая</div>`;list.forEach((n,i)=>{if(!n||!n.trim())return;const c=localStorage.getItem(`td_${currentYear}-${currentMonth}-${selectedTrainingDay}_${i}`)==='true';const l=localStorage.getItem(`tl_${currentYear}-${currentMonth}-${selectedTrainingDay}_${i}`);dh+=`<div class="training-detail-item"><input type="checkbox" ${c?'checked':''} onchange="saveTrainingCheck(${selectedTrainingDay},${i},this.checked)"><label>${n}</label><span class="training-link-icon" onclick="event.stopPropagation();editTrainingLink(${selectedTrainingDay},${i})">🔗</span><span class="training-delete-icon" onclick="event.stopPropagation();deleteTraining(${selectedTrainingDay},${i})">✕</span>${l?`<a href="${l}" target="_blank" style="font-size:10px;color:#8aa8c8">▶</a>`:''}</div>`;});dh+='<span class="training-detail-add" onclick="addTrainingDay('+selectedTrainingDay+')">+ Добавить</span>';detail.innerHTML=dh;}}

function buildCleaningDotsGrid(dim,weeks,ci,type){const grid=document.createElement('div');grid.className='dots-grid';let pw=0;for(let d=1;d<=dim;d++){const w=weeks.find(wr=>d>=wr.start&&d<=wr.end);if(w&&w.w!==pw&&pw!==0){const sp=document.createElement('div');sp.className='dot-slot separator';grid.appendChild(sp);}if(w)pw=w.w;const slot=document.createElement('div');slot.className='dot-slot';const dot=document.createElement('div');dot.className=`cleaning-dot ${type}`;if(cleaningData[CK(ci,d)])dot.classList.add('done');dot.addEventListener('click',function(){const v=!cleaningData[CK(ci,d)];cleaningData[CK(ci,d)]=v;localStorage.setItem(CK(ci,d),v?'true':'false');renderCleaningTracker();if(selectedDay===d)renderDailyCleaning();});slot.appendChild(dot);grid.appendChild(slot);}return grid;}
function renderCleaningTracker(){const dim=new Date(currentYear,currentMonth,0).getDate(),weeks=getWeekRanges(dim);document.getElementById('cleaningDayBars').innerHTML=(()=>{let h='',pw=0;for(let d=1;d<=dim;d++){const w=weeks.find(wr=>d>=wr.start&&d<=wr.end);if(w&&w.w!==pw&&pw!==0)h+='<div class="day-bar-spacer"></div>';if(w)pw=w.w;h+=`<div class="day-bar-item"><div></div><div class="day-bar-num">${d}</div></div>`;}return h;})();const container=document.getElementById('cleaningCardsContainer');container.innerHTML='';cleaningDefs.forEach((c,ci)=>{let dc=0;if(c.type==='daily'){for(let d=1;d<=dim;d++)if(cleaningData[CK(ci,d)])dc++;}else if(c.type==='weekly'){weeks.forEach(wr=>{if(cleaningData[CK(ci,wr.start)])dc++;});}else{for(let d=1;d<=dim;d++)if(cleaningData[CK(ci,d)])dc++;}const card=document.createElement('div');card.className=`cleaning-card ${c.type}`;card.innerHTML=`<div class="cleaning-card-header"><span class="cleaning-card-name">${c.name}</span><span style="font-size:11px;color:#8b7355">${dc}/${c.goal} <button class="habit-edit-btn" onclick="editCleaning(${ci})">✎</button><button class="habit-delete-btn" onclick="deleteCleaning(${ci})">✕</button></span></div>`;if(c.type==='daily'){card.appendChild(buildCleaningDotsGrid(dim,weeks,ci,'daily'));}else if(c.type==='weekly'){const wrr=document.createElement('div');wrr.className='beauty-weeks-row';weeks.forEach(wr=>{wrr.innerHTML+=`<div class="cleaning-week-block"><div class="cleaning-week-label">Нед.${wr.w}</div><div class="cleaning-week-dots"><div class="cleaning-week-dot${cleaningData[CK(ci,wr.start)]?' done':''}" onclick="const v=!cleaningData['${CK(ci,wr.start)}'];cleaningData['${CK(ci,wr.start)}']=v;localStorage.setItem('${CK(ci,wr.start)}',v?'true':'false');renderCleaningTracker();"></div></div></div>`;});card.appendChild(wrr);}else if(c.type==='monthly'){card.innerHTML+=`<div class="cleaning-month-dots"><div class="cleaning-month-dot${cleaningData[CK(ci,1)]?' done':''}" onclick="const v=!cleaningData['${CK(ci,1)}'];cleaningData['${CK(ci,1)}']=v;localStorage.setItem('${CK(ci,1)}',v?'true':'false');renderCleaningTracker();"></div></div>`;}container.appendChild(card);});renderWeekCircles('cleaningWeekCircles',dim,weeks,(wr)=>{let t=0,f=0;cleaningDefs.forEach((c,ci)=>{if(c.type==='daily'){for(let d=wr.start;d<=wr.end;d++){t++;if(cleaningData[CK(ci,d)])f++;}}else if(c.type==='weekly'){t++;if(cleaningData[CK(ci,wr.start)])f++;}});return t>0?Math.round((f/t)*100):0;});}
function addCleaning(){const name=prompt('Название:');if(!name||!name.trim())return;const type=prompt('Тип (daily/weekly/monthly):');if(!['daily','weekly','monthly'].includes(type))return;const goal=parseInt(prompt('Цель:'));if(isNaN(goal)||goal<1)return;cleaningDefs.push({name:name.trim(),type,goal});localStorage.setItem('cleaningDefs',JSON.stringify(cleaningDefs));saveAllToFB();renderCleaningTracker();}
function editCleaning(ci){const name=prompt('Название:',cleaningDefs[ci].name);if(name===null)return;const type=prompt('Тип:',cleaningDefs[ci].type);if(!['daily','weekly','monthly'].includes(type))return;const goal=parseInt(prompt('Цель:',cleaningDefs[ci].goal));if(isNaN(goal)||goal<1)return;cleaningDefs[ci]={name:name.trim()||cleaningDefs[ci].name,type,goal};localStorage.setItem('cleaningDefs',JSON.stringify(cleaningDefs));saveAllToFB();renderCleaningTracker();}
function deleteCleaning(ci){if(!confirm(`Удалить «${cleaningDefs[ci].name}»?`))return;cleaningDefs.splice(ci,1);localStorage.setItem('cleaningDefs',JSON.stringify(cleaningDefs));saveAllToFB();renderCleaningTracker();}

function toggleSection(id){const el=document.getElementById(id);el.style.maxHeight=el.style.maxHeight?null:'140px';el.style.overflow=el.style.overflow?null:'hidden';}
function refreshCurrentPage(){if(currentPage==='habits')renderHabitsTracker();else if(currentPage==='beauty')renderBeautyTracker();else if(currentPage==='training')renderTrainingTracker();else if(currentPage==='cleaning')renderCleaningTracker();}
function switchPage(page,sticker){currentPage=page;selectedTrainingDay=null;document.querySelectorAll('.sticker').forEach(s=>s.classList.remove('active'));sticker.classList.add('active');document.querySelectorAll('.tracker-page').forEach(p=>p.classList.remove('active'));document.getElementById(page).classList.add('active');localStorage.setItem('currentPage',page);const lc=document.getElementById('leftCol'),tb=document.getElementById('topBar'),mc=document.getElementById('mainContent');if(page==='daily'){lc.classList.remove('hidden');tb.classList.remove('hidden');mc.classList.remove('full-width');loadDayData();}else{lc.classList.add('hidden');tb.classList.remove('hidden');mc.classList.add('full-width');refreshCurrentPage();}}

  async function syncNow(){
  await saveAllToFB();
  alert('Данные сохранены в облако!');
}
// Старт
async function start(){
  await loadAllFromFB();
  loadAllData();
  buildCalendar();
  loadDayData();
  document.getElementById('quote').textContent=getDailyQuote();
  const pn={daily:'Ежедневник',habits:'Привычки',beauty:'Уход',training:'Тренировки',cleaning:'Уборка'};
  document.querySelectorAll('.sticker').forEach(s=>{s.addEventListener('click',function(){switchPage(this.dataset.page,this);});s.classList.toggle('active',s.textContent===pn[currentPage]);});
  document.getElementById(currentPage).classList.add('active');
  if(currentPage!=='daily'){document.getElementById('leftCol').classList.add('hidden');refreshCurrentPage();}
}
start();
</script>
