<!--
============================================================
БЛОК 1: КОММЕНТАРИИ
Всё что между символами слева и справа браузер игнорирует.
Я буду использовать их для пояснений.
============================================================
-->

<!-- Объявление типа документа. Говорит браузеру: "это HTML5" -->
<!DOCTYPE html>
<!-- 3: Открывающий тег html. lang="ru" — язык страницы русский (нужно для поисковиков и скринридеров) -->
<html lang="ru">

<!-- 4: Открывающий тег head. В head находится "невидимая" информация о странице: настройки, шрифты, стили -->
<head>

  <!-- 5: meta charset — кодировка UTF-8. Без неё русские буквы превратятся в "кракозябры" -->
  <meta charset="UTF-8">

  <!-- 6-7: viewport — как страница ведёт себя на телефоне.
       width=device-width — ширина = ширина экрана
       initial-scale=1.0 — без увеличения
       user-scalable=no — пальцами нельзя приближать
       viewport-fit=cover — заходит под "чёлку" на iPhone X и новее -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- 8-9: Настройки для iPhone когда сайт открыт как PWA (приложение с иконкой на рабочем столе)
       apple-mobile-web-app-capable — можно открыть как полноценное приложение (без адресной строки)
       status-bar-style default — строка состояния обычного цвета -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- 10: Название приложения на iPhone (когда сохраняешь на рабочий стол) -->
  <meta name="apple-mobile-web-app-title" content="Ежедневник">

  <!-- 11: Цвет верхней панели браузера на Android (телефоны Samsung, Xiaomi и т.д.) -->
  <meta name="theme-color" content="#fffef9">

  <!-- 12: Заголовок вкладки (то, что видно на вкладке в браузере) -->
  <title>📔 Мой Ежедневник</title>

  <!-- 13-14: Ссылка на иконку (favicon), которая показывается на вкладке браузера.
       Это обычная иконка для компьютера -->
  <link rel="icon" href="data:image/svg+xml;base64,...ЗДЕСЬ_ДЛИННЫЙ_BASE64...">

  <!-- 15-17: PWA-манифест. Это "паспорт" приложения для телефона.
       Говорит: "вот название, вот иконка, открывай как отдельное приложение".
       Зашит прямо в HTML через data: URI чтобы не нужен был отдельный файл -->
 <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%D0%95%D0%B6%D0%B5%D0%B4%D0%BD%D0%B5%D0%B2%D0%BD%D0%B8%D0%BA%22%2C%22short_name%22%3A%22%D0%95%D0%B6%D0%B5%D0%B4%D0%BD%D0%B5%D0%B2%D0%BD%D0%B8%D0%BA%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23fffef9%22%2C%22theme_color%22%3A%22%23fffef9%22%7D">

  <!-- 18: Открывающий тег style — здесь начинаются ВСЕ стили (CSS) -->
  <style>

    /* ============================================================
    СТРОКИ 19-350: CSS-СТИЛИ
    CSS (Cascading Style Sheets) — "каскадные таблицы стилей".
    Это язык, который говорит браузеру КАК выглядит страница:
    цвета, шрифты, отступы, размеры.

    Синтаксис CSS:
    селектор { свойство: значение; свойство: значение; }

    Селектор — К ЧЕМУ применить стиль (например, body — вся страница)
    Свойство — ЧТО меняем (например, color — цвет текста)
    Значение — НА ЧТО меняем (например, red — красный)

    /* ========== ПРАВИЛО: СБРОС ВСЕХ ОТСТУПОВ ==========
    * — звёздочка значит "ВСЕ элементы на странице"
    margin — внешний отступ
    padding — внутренний отступ
    box-sizing: border-box — чтобы ширина элемента включала padding и border
    Это нужно чтобы всё считать было проще */
    *{margin:0;padding:0;box-sizing:border-box}

    /* ========== ПРАВИЛО: ТЕЛО СТРАНИЦЫ (body) ==========
    font-family — какой шрифт использовать
    Georgia — "бумажный" шрифт с засечками (как в книгах)
    'Times New Roman' — запасной, если Georgia нет
    serif — любой шрифт с засечками, если вообще ничего нет */
    body{
      font-family:'Georgia','Times New Roman',serif;
      background:#f5f0e8; /* цвет фона: тёплый бежевый */
      display:flex; /* flexbox — умное расположение элементов */
      justify-content:center; /* по горизонтали — по центру */
      align-items:flex-start; /* по вертикали — прижать к верху */
      min-height:100vh; /* минимум 100% высоты экрана (vh = viewport height) */
      padding:20px /* отступ 20px со всех сторон */
    }

    /* ========== ПРАВИЛО: БЛОКНОТ (основной контейнер) ==========
    Это "бумажный блокнот" — белый прямоугольник с тенями
    .notebook — точка значит "класс" (class="notebook" в HTML) */
    .notebook{
      width:900px; /* ширина */
      min-height:650px; /* минимальная высота */
      background:#fffef9; /* цвет "бумаги" */
      border-radius:15px; /* скругление углов */
      position:relative; /* чтобы дочерние элементы могли позиционироваться */
      margin-top:25px; /* отступ сверху */
      /* box-shadow — тени (создают эффект обложки):
         0 0 0 15px #e8d5c4 — первый слой 15px толщиной
         0 0 0 17px #d4b896 — второй слой
         8px 0 30px rgba(0,0,0,0.2) — настоящая тень */
      box-shadow:0 0 0 15px #e8d5c4,0 0 0 17px #d4b896,8px 0 30px rgba(0,0,0,0.2);
      display:flex;
      flex-direction:column; /* дети располагаются сверху вниз */
      overflow:visible /* содержимое может выходить за край (нужно для закладок) */
    }

    /* ========== ПРАВИЛО: ДЕКОРАТИВНАЯ ТЕНЬ СПРАВА ==========
    ::after — псевдоэлемент (создаёт "виртуальный" элемент после содержимого .notebook)
    Имитирует тень книжного переплёта */
    .notebook::after{
      content:''; /* без текста */
      position:absolute; /* позиционируется относительно .notebook */
      top:0;
      right:0;
      width:20px;
      height:100%;
      background:linear-gradient(to right,rgba(0,0,0,0),rgba(0,0,0,0.03),rgba(0,0,0,0.06));
      border-radius:0 15px 15px 0;
      pointer-events:none; /* не реагирует на клики мышкой */
      z-index:5 /* слой 5 (чем больше, тем "выше") */
    }

    /* ========== ПРАВИЛО: САКУРА (фоновая веточка) ==========
    z-index: 100 — очень высоко, НО opacity: 0.07 делает её почти прозрачной */
    .sakura-bg{
      position:absolute;
      top:-10px;
      right:30px;
      width:380px;
      height:450px;
      pointer-events:none;
      z-index:100;
      opacity:.07; /* 7% непрозрачности = еле видно */
      /* background-image содержит SVG-рисунок прямо в тексте */
      background-image:url("data:image/svg+xml,...ДЛИННЫЙ_SVG...");
      background-repeat:no-repeat;
      background-position:top right;
      background-size:contain
    }

    /* ========== ПРАВИЛО: ЗАКЛАДКИ-СТИКЕРЫ ==========
    display:flex — элементы в ряд
    gap:6px — расстояние между ними
    position:absolute — можно поместить в любое место
    top:-23px — торчат НАД блокнотом */
    .stickers{
      display:flex;
      gap:6px;
      position:absolute;
      top:-23px;
      left:25px;
      z-index:110
    }

    /* Одна закладка */
    .sticker{
      padding:10px 16px 6px; /* внутренние отступы: сверху 10, по бокам 16, снизу 6 */
      border-radius:6px 6px 0 0; /* скругление только верхних углов */
      font-size:12px;
      cursor:pointer; /* курсор-рука при наведении */
      transition:.3s; /* анимация длится 0.3 секунды */
      box-shadow:2px -2px 8px rgba(0,0,0,0.08);
      font-family:'Segoe UI',sans-serif;
      letter-spacing:.5px; /* расстояние между буквами */
      color:#5a4a3a
    }

    /* nth-child(1) — первая закладка
       nth-child(2) — вторая, и так далее */
    .sticker:nth-child(1){background:#f5f0e8}  /* Ежедневник */
    .sticker:nth-child(2){background:#d9ead3}  /* Привычки */
    .sticker:nth-child(3){background:#f4cccc}  /* Уход */
    .sticker:nth-child(4){background:#cfe2f3}  /* Тренировки */
    .sticker:nth-child(5){background:#fff2cc}  /* Уборка */

    /* :hover — когда мышка наведена
       transform:translateY(-4px) — сдвинуть вверх на 4 пикселя */
    .sticker:hover{transform:translateY(-4px)}

    /* .active — когда закладка активна (открыта её страница)
       translateY(-6px) — ещё выше
       font-weight:bold — жирный шрифт */
    .sticker.active{
      transform:translateY(-6px);
      box-shadow:4px -4px 12px rgba(0,0,0,0.12);
      font-weight:bold
    }

    /* ========== ПРАВИЛО: ВЕРХНЯЯ ПАНЕЛЬ ==========
    justify-content:space-between — элементы по краям
    border-bottom — пунктирная линия снизу */
    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:25px 30px 15px;
      border-bottom:1px dashed #d4b896;
      position:relative;
      z-index:11
    }

    /* Выбор месяца (стрелки + название) */
    .month-selector{
      display:flex;
      align-items:center;
      gap:15px /* расстояние между стрелкой и названием */;
    }

    /* Кнопки-стрелки ◀ ▶ */
    .month-selector button{
      background:none; /* без фона */
      border:none; /* без рамки */
      font-size:22px;
      cursor:pointer;
      color:#8b7355;
      transition:.2s
    }

    /* При наведении на стрелку — розовый цвет и увеличение */
    .month-selector button:hover{
      color:#c8a1c0;
      transform:scale(1.2)
    }

    /* Название месяца (например "Май 2026") */
    .month-title{
      font-size:24px;
      font-weight:normal; /* не жирный */
      color:#5a4a3a
    }

    /* ========== ПРАВИЛО: ОСНОВНОЙ КОНТЕНТ ==========
    flex:1 — занимает всё доступное место */
    .content{
      display:flex;
      flex:1;
      padding:5px 25px 25px;
      gap:25px;
      position:relative;
      z-index:11
    }

    /* Левая колонка (календарь, задачи) */
    .left-col{
      width:280px;
      display:flex;
      flex-direction:column; /* сверху вниз */
      gap:20px /* расстояние между блоками */;
    }

    /* .hidden — скрывает элемент (display:none) */
    .left-col.hidden{display:none}

    /* Центральная колонка */
    .center-col{
      flex:1;
      background:#faf5ed;
      border-radius:12px;
      padding:20px;
      position:relative
    }

    /* Когда левая колонка скрыта — центр расширяется */
    .content.full-width .center-col{max-height:none}

    /* ========== ПРАВИЛО: СТРАНИЦЫ (переключение) ==========
    По умолчанию все страницы скрыты
    .active — та, которую видно */
    .tracker-page{display:none}
    .tracker-page.active{display:block}

    /* ========== ПРАВИЛО: ЗАГОЛОВКИ СЕКЦИЙ ========== */
    .section-title{
      font-size:14px;
      color:#8b7355;
      margin-top:16px;
      margin-bottom:6px;
      padding-bottom:4px;
      border-bottom:1px dotted #d4b896;
      font-weight:normal;
      cursor:pointer;
      display:flex;
      justify-content:space-between;
      align-items:center
    }

    .section-title .toggle-icon{
      font-size:12px;
      color:#b8a590;
      transition:.3s
    }

    /* Сворачиваемая секция */
    .daily-section-list{
      transition:max-height .4s ease;
      overflow:hidden
    }

    /* ========== ПРАВИЛО: ПРИВЫЧКИ В ЕЖЕДНЕВНИКЕ ========== */
    .daily-habits-row{
      display:flex;
      gap:15px;
      align-items:stretch /* растянуть по высоте */;
    }
    .daily-habits-list{flex:1}

    /* Вертикальный прогресс-бар справа */
    .daily-progress-bar-wrap{
      width:28px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-end;
      gap:4px
    }

    .daily-progress-bar-wrap .label{
      font-size:11px;
      color:#b8a590;
      text-align:center;
      font-weight:bold
    }

    .daily-progress-bar{
      width:18px;
      flex:1;
      min-height:100px;
      background:#f0e8f0;
      border-radius:9px;
      overflow:hidden;
      position:relative
    }

    /* Заполнение прогресс-бара (меняется через JS, свойство height) */
    .daily-progress-fill{
      position:absolute;
      bottom:0; /* начинается снизу */
      left:0;
      width:100%;
      background:linear-gradient(to top,#c8a1c0,#e8d0e8); /* градиент: снизу темнее */
      border-radius:9px;
      transition:height .5s /* плавное изменение высоты */;
    }

    /* ========== ПРАВИЛО: СТРОКА С ГАЛОЧКОЙ (привычка/задача) ========== */
    .habit-row{
      display:flex;
      align-items:center;
      gap:8px;
      padding:4px 0;
      border-bottom:1px dotted #f0e8d8
    }

    .habit-row input[type="checkbox"]{
      width:16px;
      height:16px;
      accent-color:#c8a1c0; /* цвет галочки (работает в Chrome) */
      cursor:pointer
    }

    .habit-row label{
      font-size:13px;
      color:#5a4a3a;
      cursor:pointer
    }

    /* Когда галочка отмечена — зачеркнуть текст
       input:checked + label — "соседний label после отмеченного input" */
    .habit-row input:checked+label{
      text-decoration:line-through;
      color:#c8b8a8;
      opacity:.6
    }

    /* ========== ПРАВИЛО: ЗАГОЛОВКИ СТРАНИЦ ========== */
    .tracker-section-header{
      font-size:15px;
      color:#8b7355;
      margin:14px 0 10px;
      font-weight:normal;
      border-bottom:1px dotted #d4b896;
      padding-bottom:4px
    }

    /* ========== ПРАВИЛО: ПОЛОСЫ ПО ДНЯМ (общий прогресс за каждый день) ========== */
    .day-bars-row{
      display:flex;
      align-items:flex-end; /* выровнять по низу */
      margin-bottom:6px;
      padding:4px 2px;
      background:#fdfaf5;
      border-radius:8px
    }

    .day-bar-item{
      display:flex;
      flex-direction:column;
      align-items:center;
      flex:1;
      min-width:8px
    }

    .day-bar-spacer{flex:.4} /* разделитель между неделями */

    .day-bar-fill{
      width:12px;
      background:linear-gradient(to top,#c8a1c0,#e0c8e0);
      border-radius:3px 3px 0 0;
      min-height:2px;
      transition:height .3s
    }

    .day-bar-num{
      font-size:9px;
      color:#8b7355;
      margin-top:2px;
      font-weight:bold
    }

    /* ========== ПРАВИЛО: СЕТКА КРУЖОЧКОВ (для привычек) ========== */
    .dots-grid{
      display:flex;
      gap:2px;
      width:100%
    }

    .dots-grid .dot-slot{
      flex:1;
      display:flex;
      justify-content:center;
      align-items:center
    }

    .dots-grid .dot-slot.separator{flex:.4}

    /* ========== ПРАВИЛО: КАРТОЧКА ПРИВЫЧКИ ==========
    border-left — цветная полоска слева (4px толщиной) */
    .habit-card{
      background:#fefcf7;
      border-radius:8px;
      padding:8px 12px;
      margin-bottom:6px;
      border-left:4px solid transparent /* transparent — прозрачный, цвет задаётся классами w1-w5 */;
    }

    /* Цвета полосок (по очереди) */
    .habit-card.w1{border-left-color:#b8956a}
    .habit-card.w2{border-left-color:#6a9e6a}
    .habit-card.w3{border-left-color:#c47a7a}
    .habit-card.w4{border-left-color:#6a8eb8}
    .habit-card.w5{border-left-color:#b8a83a}

    .habit-card-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:4px
    }

    .habit-card-name{font-size:13px;color:#5a4a3a}
    .habit-card-goal{font-size:11px;color:#8b7355;font-weight:bold}

    /* Кнопки ✎ (редактировать) и ✕ (удалить) */
    .habit-edit-btn,.habit-delete-btn{
      font-size:10px;
      cursor:pointer;
      background:none;
      border:none;
      font-family:Georgia,serif;
      margin-left:4px
    }
    .habit-edit-btn{color:#b8a590}
    .habit-delete-btn{color:#c09090}
    .task-del-btn{font-size:12px;color:#c09090;cursor:pointer;background:none;border:none;margin-left:8px}
.task-del-btn:hover{color:#d00000}

    /* Прогресс-бар внутри карточки */
    .habit-progress-bar{
      width:100%;
      height:10px;
      background:#e0d8cc;
      border-radius:5px;
      overflow:hidden;
      margin-bottom:5px
    }

    .habit-progress-fill{
      height:100%;
      border-radius:5px;
      transition:width .5s
    }

    /* Цвета заполнения прогресс-бара */
    .habit-progress-fill.w1{background:#b8956a}
    .habit-progress-fill.w2{background:#6a9e6a}
    .habit-progress-fill.w3{background:#c47a7a}
    .habit-progress-fill.w4{background:#6a8eb8}
    .habit-progress-fill.w5{background:#b8a83a}

    /* ========== ПРАВИЛО: КРУЖОЧЕК В СЕТКЕ ПРИВЫЧЕК ==========
    border-radius:50% — делает круг
    background — серый (не выполнено) */
    .habit-dot{
      width:11px;
      height:11px;
      border-radius:50%;
      background:#ddd6cc;
      cursor:pointer;
      transition:.2s
    }

    .habit-dot:hover{transform:scale(1.3)} /* увеличивается при наведении */

    /* Цветные кружочки (выполнено) */
    .habit-dot.done.w1{background:#b8956a}
    .habit-dot.done.w2{background:#6a9e6a}
    .habit-dot.done.w3{background:#c47a7a}
    .habit-dot.done.w4{background:#6a8eb8}
    .habit-dot.done.w5{background:#b8a83a}

    /* ========== ПРАВИЛО: КНОПКА ДОБАВЛЕНИЯ ========== */
    .add-btn{
      display:block;
      width:100%;
      padding:8px;
      margin-top:8px;
      background:transparent;
      border:1px dashed #c8b8a8;
      border-radius:8px;
      color:#8b7355;
      font-family:Georgia,serif;
      font-size:13px;
      cursor:pointer;
      transition:.3s
    }

    .add-btn:hover{background:#fdf5f0}

    /* ========== ПРАВИЛО: КРУГИ ПО НЕДЕЛЯМ ==========
    conic-gradient — конический градиент (как пироговая диаграмма)
    Процент заполнения задаётся через JavaScript */
    .week-circles{
      display:flex;
      justify-content:space-between;
      margin:16px 0;
      padding:0 4px
    }

    .week-circle-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
      flex:1;
      max-width:60px
    }

    .week-circle-label{font-size:10px;color:#8b7355;text-align:center}

    .week-circle{
      width:48px;
      height:48px;
      border-radius:50%;
      position:relative
    }

    .week-circle span{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%); /* ровно по центру */
      font-size:11px;
      font-weight:bold;
      color:#5a4a3a
    }

// Функция СОЗДАЁТ КЛЮЧ для привычки
// Берёт: hi (номер привычки) и d (день)
// Возвращает строку, например "2026-5-21-h0"
// В JavaScript `обратные кавычки` и ${} — это "шаблонная строка" (вставляет значение переменной в текст)
const getHKey = (hi, d) => `${currentYear}-${currentMonth}-${d}-h${hi}`;

// Ключ для ухода (bi — номер процедуры, w — неделя, sub — 'b' для второго раза или пусто)
const getBKey = (bi, w, sub) => `${currentYear}-${currentMonth}-b${bi}-w${w}${sub || ''}`;

// Ключ для уборки
const getCKey = (ci, d) => `${currentYear}-${currentMonth}-c${ci}-${d}`;

// ПРОВЕРИТЬ: выполнена ли привычка hi в день d?
// === true — строгое сравнение (вернёт true только если значение именно true, а не "true" или 1)
const getHD = (hi, d) => habitsData[getHKey(hi, d)] === true;

// ПОСЧИТАТЬ: сколько раз привычка hi выполнена в этом месяце?
const cntHD = hi => {
  let c = 0; // счётчик
  // new Date(year, month, 0).getDate() — хитрость: день 0 даёт последний день ПРЕДЫДУЩЕГО месяца
  // То есть мы узнаём количество дней в currentMonth
  for (let d = 1; d <= new Date(currentYear, currentMonth, 0).getDate(); d++) {
    if (getHD(hi, d)) c++; // если выполнена — увеличить счётчик
  }
  return c;
};

// ПОСЧИТАТЬ: сколько ВСЕХ привычек выполнено в день d?

};

// РАЗБИТЬ МЕСЯЦ НА НЕДЕЛИ
// dim — количество дней в месяце
// Возвращает массив объектов: [{w:1, start:1, end:5}, {w:2, start:6, end:12}, ...]
function getWeekRanges(dim) {
  // getDay() — день недели (0=Вс, 1=Пн, ..., 6=Сб)
  const fd = new Date(currentYear, currentMonth - 1, 1).getDay();
  const so = fd === 0 ? 7 : fd; // переводим: Пн=1, ..., Вс=7
  
  const wks = [];
  let cur = 1; // текущий день
  let wn = 1;  // номер недели
  
  // Если месяц начинается не с понедельника — первая неделя короче
  if (so > 1) {
    wks.push({ w: wn, start: 1, end: Math.min(8 - so, dim) });
    cur = (8 - so) + 1;
    wn++;
  }
  
  // Остальные недели по 7 дней
  while (cur <= dim) {
    wks.push({ w: wn, start: cur, end: Math.min(cur + 6, dim) });
    cur += 7;
    wn++;
  }
  
  return wks;
}

// НАЙТИ НЕДЕЛЮ, в которую входит день day
function getWeekForDay(day) {
  const dim = new Date(currentYear, currentMonth, 0).getDate();
  return getWeekRanges(dim).find(w => day >= w.start && day <= w.end);
}

// ЗАГРУЗИТЬ ДАННЫЕ ИЗ GOOGLE ТАБЛИЦЫ
// async — функция асинхронная (может ждать ответа от интернета)
// await — "подожди, пока придёт ответ"
async function fetchSheet(sheetName, range) {
  // URL для запроса к Google Sheets API
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${sheetName}!${range}?key=${API_KEY}`;
  try {
    const resp = await fetch(url); // отправить запрос
    const data = await resp.json(); // получить JSON-ответ
    return data.values || []; // вернуть значения (или пустой массив если ничего нет)
  } catch (e) {
    console.log('Ошибка загрузки ' + sheetName, e);
    return [];
  }
}

// ПРЕОБРАЗОВАТЬ СТРОКИ ТАБЛИЦЫ В СПИСОК ПРИВЫЧЕК
function parseHabits(rows) {
  const defs = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (r[0] && r[0].trim()) defs.push({ name: r[0].trim(), goal: parseInt(r[1]) || 31 });
  }
  return defs; // Только то что в таблице, без демо-данных
}

function parseBeauty(rows) {
  const defs = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (r[0] && r[0].trim()) defs.push({ name: r[0].trim(), freq: parseInt(r[1]) || 1 });
  }
  return defs; // Только то что в таблице, без демо-данных
}

function parseCleaning(rows) {
  const defs = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (r[0] && r[0].trim() && r[1]) {
      defs.push({
        name: r[0].trim(),
        type: r[1].trim(),
        goal: parseInt(r[2]) || (r[1] === 'daily' ? 31 : r[1] === 'weekly' ? 5 : 1)
      });
    }
  }
  return defs; // Только то что в таблице, без демо-данных
}

// ЗАГРУЗИТЬ ВСЁ ИЗ GOOGLE SHEETS И СОХРАНИТЬ В localStorage
async function loadFromSheets() {
  // Promise.all — запустить три запроса ОДНОВРЕМЕННО (быстрее)
  const [hr, br, cr] = await Promise.all([
    fetchSheet('Привычки', 'A:B'),
    fetchSheet('Уход', 'A:C'),
    fetchSheet('Уборка', 'A:C')
  ]);
  
  habitDefs = parseHabits(hr);
  beautyDefs = parseBeauty(br);
  cleaningDefs = parseCleaning(cr);
  
  // Сохранить в localStorage чтобы не грузить каждый раз из интернета
  localStorage.setItem('habitDefs_' + currentYear + '-' + currentMonth, JSON.stringify(habitDefs));
  localStorage.setItem('beautyDefs_' + currentYear + '-' + currentMonth, JSON.stringify(beautyDefs));
  localStorage.setItem('cleaningDefs_' + currentYear + '-' + currentMonth, JSON.stringify(cleaningDefs));
}

// ЗАГРУЗИТЬ ДАННЫЕ ИЗ localStorage (если интернета нет или таблица недоступна)
function loadLocalFallback(){
  const savedHabits=localStorage.getItem('habitDefs_'+currentYear+'-'+currentMonth);
  const savedBeauty=localStorage.getItem('beautyDefs_'+currentYear+'-'+currentMonth);
  const savedCleaning=localStorage.getItem('cleaningDefs_'+currentYear+'-'+currentMonth);
  
  // ЕСЛИ есть сохранённые данные — загружаем
  // ЕСЛИ нет — оставляем то, что уже в habitDefs (НЕ ЗАТИРАЕМ ПУСТОТОЙ!)
  if(savedHabits!==null) habitDefs=JSON.parse(savedHabits);
  if(savedBeauty!==null) beautyDefs=JSON.parse(savedBeauty);
  if(savedCleaning!==null) cleaningDefs=JSON.parse(savedCleaning);
}

// ЗАГРУЗИТЬ ВСЕ ОТМЕТКИ (галочки) из localStorage
function loadAllData() {
  const dim = new Date(currentYear, currentMonth, 0).getDate();
  habitsData = {};
  beautyData = {};
  cleaningData = {};
  
  // Привычки
  for (let h = 0; h < habitDefs.length; h++) {
    for (let d = 1; d <= dim; d++) {
      habitsData[getHKey(h, d)] = localStorage.getItem(getHKey(h, d)) === 'true';
    }
  }
  
  // Уход
 for (let b = 0; b < beautyDefs.length; b++) {
    for (let w = 1; w <= 5; w++) {
      const key = `beauty_week_${currentYear}-${currentMonth}-w${w}-b${b}`;
      const saved = localStorage.getItem(key);
      beautyData[key] = saved ? JSON.parse(saved) : [];
    }
  }
  
  // Уборка
  for (let c = 0; c < cleaningDefs.length; c++) {
    for (let d = 1; d <= dim; d++) {
      cleaningData[getCKey(c, d)] = localStorage.getItem(getCKey(c, d)) === 'true';
    }
  }
}

// ПОСТРОИТЬ КАЛЕНДАРЬ (заполнить таблицу числами)
function buildCalendar() {
  const body = document.getElementById('calendarBody');
  body.innerHTML = ''; // очистить
  
  // Заголовок "Май 2026"
  const t = `${MONTHS[currentMonth - 1]} ${currentYear}`;
  document.getElementById('calMonthTitle').textContent = t;
  document.getElementById('monthTitle').textContent = t;
  
  const dim = new Date(currentYear, currentMonth, 0).getDate(); // дней в месяце
  const fd = new Date(currentYear, currentMonth - 1, 1).getDay();
  const sd = fd === 0 ? 7 : fd; // день недели первого числа (Пн=1)
  
  if (selectedDay > dim) selectedDay = dim; // если 31 февраля → скорректировать
  
  let row = document.createElement('tr'); // создать строку таблицы
  
  // Пустые ячейки до первого дня
  for (let i = 1; i < sd; i++) {
    row.appendChild(document.createElement('td'));
  }
  
  // Ячейки с числами
  for (let d = 1; d <= dim; d++) {
    const cell = document.createElement('td');
    cell.textContent = d;
    
    // addEventListener — "слушатель события": при клике выполнит selectDay()
    cell.addEventListener('click', function() { selectDay(d, cell); });
    
    // Подсветка сегодняшнего дня
    if (d === now.getDate() && currentMonth === now.getMonth() + 1 && currentYear === now.getFullYear()) {
      cell.classList.add('today'); // добавить класс today (зелёный фон)
    }
    
    // Подсветка выбранного дня
    if (d === selectedDay) {
      cell.classList.add('selected');
    }
    
    row.appendChild(cell);
    
    // Конец недели (каждые 7 дней) или конец месяца — начать новую строку
    if ((d + sd - 1) % 7 === 0 || d === dim) {
      body.appendChild(row);
      row = document.createElement('tr');
    }
  }
}

// ВЫБРАТЬ ДЕНЬ в календаре
function selectDay(day, cell) {
  selectedDay = day;
  
  // Убрать выделение со всех ячеек
  document.querySelectorAll('.calendar-widget td').forEach(td => td.classList.remove('selected'));
  
  // Выделить новую
  if (cell) cell.classList.add('selected');
  
  loadDayData(); // обновить задачи, привычки и т.д. для этого дня
}

// Отметка дня в трекере ухода (клик по кружочку)
function toggleBeautyDay(bi, w, d) {
  const key = `beauty_week_${currentYear}-${currentMonth}-w${w}-b${bi}`;
  let checkedDays = beautyData[key] || [];
  const idx = checkedDays.indexOf(d);
  if (idx === -1) {
    checkedDays.push(d);
  } else {
    checkedDays.splice(idx, 1);

// Получить понедельник недели, в которую входит дата ds
function getMonday(ds) {
  const d = new Date(ds);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff);
  return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
}

// Сетка кружочков для одной привычки
function buildDotsGrid(dim, weeks, hi) {
  const grid = document.createElement('div');
  grid.className = 'dots-grid';
  let pw = 0; // предыдущая неделя
  
  for (let d = 1; d <= dim; d++) {
    const w = weeks.find(wr => d >= wr.start && d <= wr.end);
    
    // Разделитель между неделями
    if (w && w.w !== pw && pw !== 0) {
      const sp = document.createElement('div');
      sp.className = 'dot-slot separator';
      grid.appendChild(sp);
    }
    if (w) pw = w.w;
    
    const slot = document.createElement('div');
    slot.className = 'dot-slot';
    
    const dot = document.createElement('div');
    dot.className = 'habit-dot';
    
    if (getHD(hi, d)) {
      dot.classList.add('done');
      dot.classList.add(WCLS[hi % 5]); // цвет по номеру привычки
    }
    
    // Клик — переключить отметку
    dot.addEventListener('click', function() {
      const v = !getHD(hi, d);
      habitsData[getHKey(hi, d)] = v;
      localStorage.setItem(getHKey(hi, d), v ? 'true' : 'false');
      renderHabitsTracker();
      if (selectedDay === d) renderDailyHabits();
    });
    
    slot.appendChild(dot);
    grid.appendChild(slot);
  }
  
  return grid;
}

// Отрисовать страницу привычек
function renderHabitsTracker() {
  const dim = new Date(currentYear, currentMonth, 0).getDate();
  const weeks = getWeekRanges(dim);
  
  // Полосы по дням
  document.getElementById('dayBarsRow').innerHTML = (() => {
    let h = '';
    let pw = 0;
    for (let d = 1; d <= dim; d++) {
      const w = weeks.find(wr => d >= wr.start && d <= wr.end);
      if (w && w.w !== pw && pw !== 0) h += '<div class="day-bar-spacer"></div>';
      if (w) pw = w.w;
      const pct = habitDefs.length > 0 ? (cntDD(d) / habitDefs.length) * 100 : 0;
      h += `<div class="day-bar-item"><div class="day-bar-fill" style="height:${Math.max(2, pct * 1.5)}px"></div><div class="day-bar-num">${d}</div></div>`;
    }
    return h;
  })();
  
  // Карточки привычек
  const cards = document.getElementById('habitsCardsContainer');
  cards.innerHTML = '';
  
  habitDefs.forEach((h, hi) => {
    const dc = cntHD(hi);
    const pct = Math.round((dc / h.goal) * 100);
    
    const card = document.createElement('div');
    card.className = `habit-card ${WCLS[hi % 5]}`;
    card.innerHTML = `
      <div class="habit-card-header">
        <span class="habit-card-name">${h.name}</span>
        <span class="habit-card-goal">${dc}/${h.goal} <button class="habit-edit-btn" onclick="editHabit(${hi})">✎</button><button class="habit-delete-btn" onclick="deleteHabit(${hi})">✕</button></span>
      </div>
      <div class="habit-progress-bar"><div class="habit-progress-fill ${WCLS[hi % 5]}" style="width:${pct}%"></div></div>
    `;
    card.appendChild(buildDotsGrid(dim, weeks, hi));
    cards.appendChild(card);
  });
  
  // Круги по неделям
  renderWeekCircles('weekCirclesContainer', dim, weeks, (wr) => {
    let t = 0, d = 0;
    for (let dd = wr.start; dd <= wr.end; dd++) {
      for (let h = 0; h < habitDefs.length; h++) {
        t++;
        if (getHD(h, dd)) d++;
      }
    }
    return t > 0 ? Math.round((d / t) * 100) : 0;
  });
  
  // Блоки "требуют внимания" и "лучшие"
  renderInsightBlocks();
}

// Блоки "требуют внимания" и "лучшие"
function renderInsightBlocks() {
  // Сортируем по проценту выполнения
  const stats = habitDefs.map((h, i) => ({
    name: h.name,
    pct: Math.round((cntHD(i) / h.goal) * 100)
  })).sort((a, b) => a.pct - b.pct); // от меньшего к большему
  
  // 3 худших
  document.getElementById('attentionList').innerHTML = stats.slice(0, 3).map(h => `
    <div class="insight-item"><span>${h.name}</span><span class="percent">${h.pct}%</span></div>
  `).join('');
  
  // 3 лучших (slice(-3) — последние 3, reverse — перевернуть)
  document.getElementById('successList').innerHTML = stats.slice(-3).reverse().map(h => `
    <div class="insight-item"><span>${h.name}</span><span class="percent">${h.pct}%</span></div>
  `).join('');
}

function renderBeautyTracker() {
  const dim = new Date(currentYear, currentMonth, 0).getDate();
  const weeks = getWeekRanges(dim);

  // Дневные полосы
  document.getElementById('beautyDayBars').innerHTML = (() => {
    let h = '', pw = 0;
    for (let d = 1; d <= dim; d++) {
      const w = weeks.find(wr => d >= wr.start && d <= wr.end);
      if (w && w.w !== pw && pw !== 0) h += '<div class="day-bar-spacer"></div>';
      if (w) pw = w.w;
      h += `<div class="day-bar-item"><div></div><div class="day-bar-num">${d}</div></div>`;
    }
    return h;
  })();

  const container = document.getElementById('beautyCardsContainer');
  container.innerHTML = '';

  beautyDefs.forEach((b, bi) => {
    // Считаем общее количество выполнений за месяц
    let totalDone = 0;
    weeks.forEach(wr => {
      const key = `beauty_week_${currentYear}-${currentMonth}-w${wr.w}-b${bi}`;
      const checkedDays = beautyData[key] || [];
      totalDone += checkedDays.length;
    });
    
    const totalGoal = b.goal * weeks.length; // цель на месяц = цель в неделю × количество недель
    const pct = Math.round((totalDone / totalGoal) * 100);

    const card = document.createElement('div');
    card.className = `habit-card ${WCLS[bi % 5]}`;
    card.innerHTML = `
      <div class="habit-card-header">
        <span class="habit-card-name">${b.name}</span>
        <span class="habit-card-goal">${totalDone}/${totalGoal} 
          <button class="habit-edit-btn" onclick="editBeauty(${bi})">✎</button>
          <button class="habit-delete-btn" onclick="deleteBeauty(${bi})">✕</button>
        </span>
      </div>
      <div class="habit-progress-bar">
        <div class="habit-progress-fill ${WCLS[bi % 5]}" style="width:${Math.min(pct, 100)}%"></div>
      </div>
    `;

    // Строим сетку кружочков по дням (как в привычках)
    const grid = document.createElement('div');
    grid.className = 'dots-grid';
    let prevWeek = 0;

    for (let d = 1; d <= dim; d++) {
      const w = weeks.find(wr => d >= wr.start && d <= wr.end);
      
      // Разделитель между неделями
      if (w && w.w !== prevWeek && prevWeek !== 0) {
        const sp = document.createElement('div');
        sp.className = 'dot-slot separator';
        grid.appendChild(sp);
      }
      if (w) prevWeek = w.w;

      const slot = document.createElement('div');
      slot.className = 'dot-slot';

      const dot = document.createElement('div');
      dot.className = `habit-dot ${WCLS[bi % 5]}`;
      
      const key = `beauty_week_${currentYear}-${currentMonth}-w${w.w}-b${bi}`;
      const checkedDays = beautyData[key] || [];
      if (checkedDays.includes(d)) {
        dot.classList.add('done');
      }

      dot.addEventListener('click', function() {
        const k = `beauty_week_${currentYear}-${currentMonth}-w${w.w}-b${bi}`;
        let arr = beautyData[k] || [];
        const idx = arr.indexOf(d);
        if (idx === -1) {
          arr.push(d);
        } else {
          arr.splice(idx, 1);
        }
        beautyData[k] = arr;
        localStorage.setItem(k, JSON.stringify(arr));
        renderBeautyTracker();
        if (selectedDay === d && currentPage === 'daily') renderDailyBeauty();
      });

      slot.appendChild(dot);
      grid.appendChild(slot);
    }

    card.appendChild(grid);
    container.appendChild(card);
  });

  // Круги по неделям
  renderWeekCircles('beautyWeekCircles', dim, weeks, (wr) => {
    let totalGoal = 0, totalDone = 0;
    beautyDefs.forEach((b, bi) => {
      totalGoal += b.goal;
      const key = `beauty_week_${currentYear}-${currentMonth}-w${wr.w}-b${bi}`;
      const checkedDays = beautyData[key] || [];
      totalDone += checkedDays.length;
    });
    return totalGoal > 0 ? Math.round((totalDone / totalGoal) * 100) : 0;
  });
}

function renderTrainingTracker() {
  const dim = new Date(currentYear, currentMonth, 0).getDate();
  const grid = document.getElementById('trainingGrid');
  grid.innerHTML = '';
  
  const fd = new Date(currentYear, currentMonth - 1, 1).getDay();
  const so = fd === 0 ? 7 : fd;
  
  let day = 1;
  let fr = true;
  
  while (day <= dim) {
    let rowHTML = '<div class="training-week-row">';
    
    for (let col = 1; col <= 7; col++) {
      if (fr && col < so) {
        rowHTML += '<div class="training-day-cell empty"></div>';
        continue;
      }
      if (day > dim) {
        rowHTML += '<div class="training-day-cell empty"></div>';
        day++;
        continue;
      }
      
      const dow = new Date(currentYear, currentMonth - 1, day).getDay();
      const list = getTrainingList(day);
      let total = 0, done = 0;
      
      list.forEach((n, i) => {
        if (!n || !n.trim()) return;
        total++;
        if (localStorage.getItem(`td_${currentYear}-${currentMonth}-${day}_${i}`) === 'true') done++;
      });
      
      const sel = selectedTrainingDay === day ? ' selected' : '';
      rowHTML += `<div class="training-day-cell${dow === 0 || dow === 6 ? ' weekend' : ''}${sel}" onclick="selectedTrainingDay=selectedTrainingDay===${day}?null:${day};renderTrainingTracker();">
                    <div class="training-day-num">${day}</div>
                    <div class="training-day-bar"><div class="training-day-bar-fill" style="width:${total > 0 ? Math.round((done / total) * 100) : 0}%"></div></div>
                    <div class="training-day-indicators">${list.filter(n => n && n.trim()).map((n, i) => `<div class="training-dot${localStorage.getItem('td_' + currentYear + '-' + currentMonth + '-' + day + '_' + i) === 'true' ? ' done' : ''}"></div>`).join('')}</div>
                  </div>`;
      day++;
    }
    
    rowHTML += '</div>';
    grid.innerHTML += rowHTML;
    fr = false;
  }
  
  // Детали выбранного дня
  const detail = document.getElementById('trainingDetail');
  detail.innerHTML = '';
  
  if (selectedTrainingDay) {
    const list = getTrainingList(selectedTrainingDay);
    detail.className = 'training-detail';
    let html = `<div class="training-detail-date">${selectedTrainingDay} ${MONTHS[currentMonth - 1].toLowerCase()}</div>`;
    
    list.forEach((n, i) => {
      if (!n || !n.trim()) return;
      const checked = localStorage.getItem(`td_${currentYear}-${currentMonth}-${selectedTrainingDay}_${i}`) === 'true';
      const link = localStorage.getItem(`tl_${currentYear}-${currentMonth}-${selectedTrainingDay}_${i}`);
      html += `<div class="training-detail-item">
                <input type="checkbox" ${checked ? 'checked' : ''} onchange="saveTrainingCheck(${selectedTrainingDay},${i},this.checked)">
                <label>${n}</label>
                <span onclick="event.stopPropagation();editTrainingLink(${selectedTrainingDay},${i})" style="cursor:pointer;font-size:11px;">🔗</span>
                <span onclick="event.stopPropagation();deleteTraining(${selectedTrainingDay},${i})" style="cursor:pointer;font-size:11px;color:#c09090;">✕</span>
                ${link ? `<a href="${link}" target="_blank" style="font-size:10px;color:#8aa8c8">▶</a>` : ''}
              </div>`;
    });
    
    html += '<span onclick="addTrainingDay(' + selectedTrainingDay + ')" style="cursor:pointer;color:#8aa8c8;font-size:12px;">+ Добавить</span>';
    detail.innerHTML = html;
  }
}


// ==================== СТРАНИЦА УБОРКИ ====================

function buildCleaningDotsGrid(dim, weeks, ci, type) {
  const grid = document.createElement('div');
  grid.className = 'dots-grid';
  let pw = 0;
  
  for (let d = 1; d <= dim; d++) {
    const w = weeks.find(wr => d >= wr.start && d <= wr.end);
    if (w && w.w !== pw && pw !== 0) {
      const sp = document.createElement('div');
      sp.className = 'dot-slot separator';
      grid.appendChild(sp);
    }
    if (w) pw = w.w;
    
    const slot = document.createElement('div');
    slot.className = 'dot-slot';
    
    const dot = document.createElement('div');
    dot.className = `cleaning-dot ${type}`;
    if (cleaningData[getCKey(ci, d)]) dot.classList.add('done');
    
    dot.addEventListener('click', function() {
      const v = !cleaningData[getCKey(ci, d)];
      cleaningData[getCKey(ci, d)] = v;
      localStorage.setItem(getCKey(ci, d), v ? 'true' : 'false');
      renderCleaningTracker();
      if (selectedDay === d) renderDailyCleaning();
    });
    
    slot.appendChild(dot);
    grid.appendChild(slot);
  }
  
  return grid;
}

function renderCleaningTracker() {
  const dim = new Date(currentYear, currentMonth, 0).getDate();
  const weeks = getWeekRanges(dim);
  
  document.getElementById('cleaningDayBars').innerHTML = (() => {
    let h = '';
    let pw = 0;
    for (let d = 1; d <= dim; d++) {
      const w = weeks.find(wr => d >= wr.start && d <= wr.end);
      if (w && w.w !== pw && pw !== 0) h += '<div class="day-bar-spacer"></div>';
      if (w) pw = w.w;
      h += `<div class="day-bar-item"><div></div><div class="day-bar-num">${d}</div></div>`;
    }
    return h;
  })();
  
  const container = document.getElementById('cleaningCardsContainer');
  container.innerHTML = '';
  
  cleaningDefs.forEach((c, ci) => {
    let dc = 0;
    if (c.type === 'daily') {
      for (let d = 1; d <= dim; d++) if (cleaningData[getCKey(ci, d)]) dc++;
    } else if (c.type === 'weekly') {
      weeks.forEach(wr => { if (cleaningData[getCKey(ci, wr.start)]) dc++; });
    } else {
      for (let d = 1; d <= dim; d++) if (cleaningData[getCKey(ci, d)]) dc++;
    }
    
    const card = document.createElement('div');
    card.className = `cleaning-card ${c.type}`;
    card.innerHTML = `<div class="cleaning-card-header">
                        <span class="cleaning-card-name">${c.name}</span>
                        <span style="font-size:11px;color:#8b7355">${dc}/${c.goal} <button class="habit-edit-btn" onclick="editCleaning(${ci})">✎</button><button class="habit-delete-btn" onclick="deleteCleaning(${ci})">✕</button></span>
                      </div>`;
    
    if (c.type === 'daily') {
      card.appendChild(buildCleaningDotsGrid(dim, weeks, ci, 'daily'));
    } else if (c.type === 'weekly') {
      const wrr = document.createElement('div');
      wrr.className = 'beauty-weeks-row';
      weeks.forEach(wr => {
        wrr.innerHTML += `<div class="cleaning-week-block">
                            <div class="cleaning-week-label">Нед.${wr.w}</div>
                            <div class="cleaning-week-dots">
                              <div class="cleaning-week-dot${cleaningData[getCKey(ci, wr.start)] ? ' done' : ''}" onclick="const v=!cleaningData['${getCKey(ci, wr.start)}'];cleaningData['${getCKey(ci, wr.start)}']=v;localStorage.setItem('${getCKey(ci, wr.start)}',v?'true':'false');renderCleaningTracker();"></div>
                            </div>
                          </div>`;
      });
      card.appendChild(wrr);
    } else if (c.type === 'monthly') {
      card.innerHTML += `<div class="cleaning-month-dots">
                           <div class="cleaning-month-dot${cleaningData[getCKey(ci, 1)] ? ' done' : ''}" onclick="const v=!cleaningData['${getCKey(ci, 1)}'];cleaningData['${getCKey(ci, 1)}']=v;localStorage.setItem('${getCKey(ci, 1)}',v?'true':'false');renderCleaningTracker();"></div>
                         </div>`;
    }
    
    container.appendChild(card);
  });
  
  renderWeekCircles('cleaningWeekCircles', dim, weeks, (wr) => {
    let t = 0, f = 0;
    cleaningDefs.forEach((c, ci) => {
      if (c.type === 'daily') {
        for (let d = wr.start; d <= wr.end; d++) { t++; if (cleaningData[getCKey(ci, d)]) f++; }
      } else if (c.type === 'weekly') {
        t++; if (cleaningData[getCKey(ci, wr.start)]) f++;
      }
    });
    return t > 0 ? Math.round((f / t) * 100) : 0;
  });
}

function addCleaning() {
  const name = prompt('Название:');
  if (!name || !name.trim()) return;
  const type = prompt('Тип (daily/weekly/monthly):');
  if (!['daily', 'weekly', 'monthly'].includes(type)) return;
  const goal = parseInt(prompt('Цель:'));
  if (isNaN(goal) || goal < 1) return;
  cleaningDefs.push({ name: name.trim(), type, goal });
  saveAllDefs();
  renderCleaningTracker();
}

function editCleaning(ci) {
  const name = prompt('Название:', cleaningDefs[ci].name);
  if (name === null) return;
  const type = prompt('Тип:', cleaningDefs[ci].type);
  if (!['daily', 'weekly', 'monthly'].includes(type)) return;
  const goal = parseInt(prompt('Цель:', cleaningDefs[ci].goal));
  if (isNaN(goal) || goal < 1) return;
  cleaningDefs[ci] = { name: name.trim() || cleaningDefs[ci].name, type, goal };
  saveAllDefs();
  renderCleaningTracker();
}

function deleteCleaning(ci) {
  if (!confirm(`Удалить «${cleaningDefs[ci].name}»?`)) return;
  cleaningDefs.splice(ci, 1);
  saveAllDefs();
  renderCleaningTracker();
}


// ==================== НАВИГАЦИЯ (переключение страниц) ====================

// Свернуть/развернуть секцию
function toggleSection(id) {
  const el = document.getElementById(id);
  // Если maxHeight уже установлен — убрать, иначе — установить 140px
  el.style.maxHeight = el.style.maxHeight ? null : '140px';
  el.style.overflow = el.style.overflow ? null : 'hidden';
}

// Обновить текущую страницу
function refreshCurrentPage() {
  if (currentPage === 'habits') renderHabitsTracker();
  else if (currentPage === 'beauty') renderBeautyTracker();
  else if (currentPage === 'training') renderTrainingTracker();
  else if (currentPage === 'cleaning') renderCleaningTracker();
}

// Переключить страницу
function switchPage(page, sticker) {
  currentPage = page;
  selectedTrainingDay = null;
  
  // Обновить закладки
  document.querySelectorAll('.sticker').forEach(s => s.classList.remove('active'));
  sticker.classList.add('active');
  
  // Показать нужную страницу, скрыть остальные
  document.querySelectorAll('.tracker-page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
  
  localStorage.setItem('currentPage', page);
  
  const lc = document.getElementById('leftCol');
  const tb = document.getElementById('topBar');
  const mc = document.getElementById('mainContent');
  
  if (page === 'daily') {
    // Ежедневник: показать левую колонку
    lc.classList.remove('hidden');
    tb.classList.remove('hidden');
    mc.classList.remove('full-width');
    loadDayData();
  } else {
    // Другие страницы: скрыть левую колонку
    lc.classList.add('hidden');
    tb.classList.remove('hidden');
    mc.classList.add('full-width');
    refreshCurrentPage();
  }
}


// ==================== ЗАПУСК ПРИЛОЖЕНИЯ ====================

// ЗАМЕТКИ
function renderNotes(){
  const dk=`${currentYear}-${currentMonth}-${selectedDay}`;
  const notes=JSON.parse(localStorage.getItem('notes_'+dk)||'[]');
  document.getElementById('notesList').innerHTML=notes.map((n,i)=>`
    <div class="note-item">
      <div class="note-text" onclick="editNote(${i})">${n}</div>
      <div class="note-actions">
        <button class="note-edit-btn" onclick="editNote(${i})">✎</button>
        <button class="note-del-btn" onclick="deleteNote(${i})">✕</button>
      </div>
    </div>
  `).join('');
}

// Авто-высота поля заметки
document.getElementById('newNoteText').addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=this.scrollHeight+'px';
});

function addNote(){
  const textarea=document.getElementById('newNoteText');
  const text=textarea.value.trim();
  if(!text)return;
  const dk=`${currentYear}-${currentMonth}-${selectedDay}`;
  const notes=JSON.parse(localStorage.getItem('notes_'+dk)||'[]');
  notes.push(text);
  localStorage.setItem('notes_'+dk,JSON.stringify(notes));
  textarea.value='';
  textarea.style.height='40px';  // ← добавить эту
  renderNotes();
}

function editNote(idx){
  const dk=`${currentYear}-${currentMonth}-${selectedDay}`;
  const notes=JSON.parse(localStorage.getItem('notes_'+dk)||'[]');
  const newText=prompt('Редактировать заметку:',notes[idx]);
  if(newText===null)return;
  notes[idx]=newText.trim();
  localStorage.setItem('notes_'+dk,JSON.stringify(notes));
  renderNotes();
}

function deleteNote(idx){
  if(!confirm('Удалить заметку?'))return;
  const dk=`${currentYear}-${currentMonth}-${selectedDay}`;
  const notes=JSON.parse(localStorage.getItem('notes_'+dk)||'[]');
  notes.splice(idx,1);
  localStorage.setItem('notes_'+dk,JSON.stringify(notes));
  renderNotes();
}

// Ctrl+Enter для добавления заметки
document.addEventListener('keydown',function(e){
  if(e.ctrlKey&&e.key==='Enter'&&document.activeElement===document.getElementById('newNoteText')){
    addNote();
  }
});

// async — функция может использовать await (ждать интернет)
async function init(){
  // Google Sheets временно отключены — используем только localStorage
  loadLocalFallback();
  loadAllData();
  buildCalendar();
  loadDayData();
  // ... остальное не трогай
  
  // Показать цитату
  document.getElementById('quote').textContent = getDailyQuote();
  
  // Навесить клики на закладки
  const pageNames = {
    daily: 'Ежедневник',
    habits: 'Привычки',
    beauty: 'Уход',
    training: 'Тренировки',
    cleaning: 'Уборка'
  };
  
  document.querySelectorAll('.sticker').forEach(s => {
    s.addEventListener('click', function() { switchPage(this.dataset.page, this); });
    s.classList.toggle('active', s.textContent === pageNames[currentPage]);
  });
  
  document.getElementById(currentPage).classList.add('active');
  
  if (currentPage !== 'daily') {
    document.getElementById('leftCol').classList.add('hidden');
    refreshCurrentPage();
  }
}

// ЗАПУСК! Всё начинается здесь
function clearFutureMonths() {
  const now = new Date();
  const thisMonth = now.getMonth() + 1;
  const thisYear = now.getFullYear();
  
  // Собрать все ключи из localStorage
  const keys = Object.keys(localStorage);
  let removed = 0;
  
  keys.forEach(key => {
    // Пропускаем текущий месяц
    if (key.includes(`${thisYear}-${thisMonth}`)) return;
    
    // Удаляем всё, что связано с привычками, уходом, уборкой, тренировками
    if (
      key.startsWith('habitDefs_') ||
      key.startsWith('beautyDefs_') ||
      key.startsWith('cleaningDefs_') ||
      key.startsWith('trainingDefs_') ||
      key.includes('-h') || key.includes('-b') || key.includes('-c') ||
      key.startsWith('td_') || key.startsWith('tl_') ||
      key.startsWith('daily_') || key.startsWith('week_') || key.startsWith('notes_') ||
      key.startsWith('beauty_week_done_') || key.startsWith('clean_week_done_')
    ) {
      localStorage.removeItem(key);
      removed++;
    }
  });
  
  // Очистить данные выбора месяца
  localStorage.removeItem('selectedMonth');
  localStorage.removeItem('selectedYear');
  
  alert(`Очищено ${removed} записей! Сейчас страница обновится.`);
  location.reload(); // перезагрузить страницу
}
init();
